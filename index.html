<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="styles.css" />
    <title>Frontend Mentor | Stats preview card component</title>
  </head>
  <body>
    <main>
      <div class="card">
        <section class="hero-img-container"></section>
        <section class="text-container">
          <h1>Get <span>insights</span> that help your business grow.</h1>
          <p class="main-text">
            Discover the benefits of data analytics and make better decisions
            regarding revenue, customer experience, and overall efficiency.
          </p>
          <div class="stats-section-container">
            <div class="stat-container">
              <p class="number">10k+</p>
              <p class="category">COMPANIES</p>
            </div>
            <div class="stat-container">
              <p class="number">314</p>
              <p class="category">TEMPLATES</p>
            </div>
            <div class="stat-container">
              <p class="number">12M+</p>
              <p class="category">QUERIES</p>
            </div>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
